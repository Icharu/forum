<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- LEFT SIDEBAR COMPONENT -->
  <app-sidebar [(sidebarOpen)]="sidebarOpen" currentRoute="creditos"></app-sidebar>

  <!-- MAIN CONTENT -->
  <div class="main-wrapper">

    <!-- TOP NAVBAR COMPONENT -->
    <app-topbar
      [sidebarOpen]="sidebarOpen"
      (toggleSidebar)="toggleSidebar()"
      activeTab="">
    </app-topbar>

    <!-- HERO BANNER -->
    <div class="hero-banner">
      <div class="hero-text">
        <div class="frase" [innerHTML]="textoDigitado"></div>
        <p class="hero-sub">Conheça quem está por trás do Fórum EngComp UEMA.</p>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <div class="credits-card">

        <div class="credits-avatar">
          <a (click)="abrirSite('https://icarodejesus.com/')">
            <img src="/img/Icarus7.png" alt="Icaro de Jesus Silva">
          </a>
        </div>

        <div class="credits-info">
          <div class="credits-meta">
            <span class="thread-tag">Criador</span>
          </div>
          <h2 class="credits-name">Icaro de Jesus Silva</h2>
          <p class="credits-bio">Estudante de Engenharia de Computação na UEMA, criador deste site para ajudar os calouros a se situarem no curso.</p>
          <div class="credits-actions">
            <button class="action-btn" (click)="abrirSite('https://icarodejesus.com/')">
              <mat-icon>open_in_new</mat-icon> Portfólio
            </button>
            <button class="action-btn secondary" (click)="abrirSite('https://github.com/Icharu/forum')">
              <mat-icon>code</mat-icon> Repositório
            </button>
          </div>
        </div>

        <div class="credits-gif">
          <img src="/gof/icarus.gif" alt="Icarus">
        </div>

      </div>

    </div>
  </div>

</div>

<!-- FLOATING CARD COMPONENT -->
<app-floating-card [visible]="showButton"></app-floating-card>
